<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>📤 Upload App</h1>

<div class="app-card">

    <input type="text" id="appName" placeholder="App Name"><br><br>
<textarea id="appDescription" placeholder="App Description"></textarea><br><br>
<input type="text" id="appVersion" placeholder="App Version"><br><br>
<input type="text" id="appCategory" placeholder="Category (Game, App, Tool)">
<br><br>
    <input type="text" id="appLink" placeholder="APK Download Link"><br><br>
    <input type="text" id="appLogo" placeholder="App Logo URL"><br><br>
<img id="logoPreview" src="" width="80"><br><br>
    <button id="uploadBtn">Upload App</button>

</div>

<script type="module" src="admin.js"></script>

</body>
</html>
